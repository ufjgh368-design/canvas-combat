<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#090e1c"><title>西洋藝術大亂鬥：Canvas Combat</title><meta name="description" content="回答西洋藝術史問題，與十八位藝術家展開回合制知識格鬥。"><link rel="stylesheet" href="style.css"></head>
<body><a class="skip" href="#app">跳至遊戲</a><div id="intro" class="intro" aria-label="遊戲序幕"><div class="intro-mark">CC</div><p>THE GRAND MUSEUM PRESENTS</p><button id="skipIntro">進入展廳</button></div>
<div id="app" hidden>
 <header class="topbar"><button class="brand" data-home aria-label="返回主選單"><span>CANVAS</span> COMBAT</button><div class="top-actions"><span id="unlockCount"></span><button id="muteBtn" aria-label="切換靜音">♫</button><button id="pauseBtn" aria-label="暫停">Ⅱ</button></div></header>
 <main>
  <section id="home" class="screen active"><div class="hero"><p class="eyebrow">WESTERN ART HISTORY KNOWLEDGE FIGHTING RPG</p><h1>西洋藝術<br><em>大亂鬥</em></h1><p>知識是你的武器，畫布就是競技場。</p></div><div id="modeGrid" class="mode-grid"></div><div class="timeline" aria-label="藝術史時間線"><span>文藝復興</span><span>巴洛克</span><span>浪漫主義</span><span>印象派</span><span>現代藝術</span><span>普普藝術</span></div></section>
  <section id="setup" class="screen"><div class="panel wide"><button class="back" data-home>← 主選單</button><p class="eyebrow" id="setupMode"></p><h2>準備進入畫框</h2><div id="setupOptions"></div><div class="artist-select-wrap"><div><label>P1 玩家名稱<input id="p1Name" maxlength="16"></label><h3>P1 藝術家</h3><div id="p1Artists" class="artist-grid"></div></div><div id="p2Setup"><label>P2 玩家名稱<input id="p2Name" maxlength="16"></label><h3>P2 藝術家</h3><div id="p2Artists" class="artist-grid"></div></div></div><p id="setupError" class="error" role="alert"></p><button id="startBattle" class="primary">開始對戰</button></div></section>
  <section id="battle" class="screen battle-screen"><div class="battle-top"><div id="hudA" class="hud"></div><div class="round-center"><b id="modeLabel"></b><span id="roundLabel">ROUND 1</span><strong id="battleTimer">00</strong><span id="cpuState"></span></div><div id="hudB" class="hud right"></div></div><div id="arena"><canvas id="battleCanvas" aria-label="藝術家格鬥動畫"></canvas><div id="arenaAlert" aria-live="assertive"></div><div id="turnBanner"></div></div><div id="battleControls"><div id="skillButtons" class="skills"></div><div id="quizPanel" class="quiz" hidden><div class="quiz-meta"><span id="difficultyBadge"></span><span id="questionTimer"></span></div><h2 id="questionText"></h2><div id="answers" class="answers"></div><div id="feedback" aria-live="polite"></div></div></div></section>
  <section id="content" class="screen"><div class="panel wide"><button class="back" data-home>← 主選單</button><div id="contentBody"></div></div></section>
 </main>
 <div id="modal" class="modal" hidden><div class="modal-card" role="dialog" aria-modal="true"><div id="modalBody"></div><button id="modalClose" class="primary">繼續</button></div></div>
 <div id="toast" role="status"></div>
</div><script type="module" src="js/main.js"></script></body></html>
