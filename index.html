<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#080b18"><title>西洋音樂家大亂鬥｜Maestro Combat</title><meta name="description" content="用西洋音樂史知識發動招式，與 34 位傳奇作曲家展開節奏、旋律與和聲的格鬥 RPG。"><link rel="stylesheet" href="style.css"><link rel="stylesheet" href="homepage.css"></head>
<body><a class="skip" href="#app">跳到主要內容</a><div id="intro" class="intro" aria-label="遊戲開場"><div class="intro-mark">MC</div><p>THE GRAND CONCERT HALL PRESENTS</p><button id="skipIntro">進入音樂殿堂</button></div>
<div id="app" hidden><header class="topbar"><button class="brand" data-home aria-label="返回主選單"><span>MAESTRO</span> COMBAT</button><div class="top-actions"><span id="unlockCount"></span><button id="muteBtn" aria-label="切換聲音">♫</button><button id="pauseBtn" aria-label="暫停">Ⅱ</button></div></header>
<main><section id="home" class="screen active"><div class="hero"><p class="eyebrow">WESTERN MUSIC HISTORY KNOWLEDGE FIGHTING RPG</p><h1>西洋音樂家<br><em>知識格鬥</em></h1><p>旋律是招式，節奏是連擊，知識就是你的最強樂章。</p></div><div id="modeGrid" class="mode-grid"></div><div class="timeline" aria-label="音樂史時間線"><span>巴洛克</span><span>古典樂派</span><span>浪漫樂派</span><span>民族樂派</span><span>現代音樂</span><span>跨界舞台</span></div></section>
<section id="setup" class="screen submenu-screen"><div class="panel wide setup-panel"><button class="back" data-home>← 主選單</button><div class="setup-title"><div><p class="eyebrow" id="setupMode"></p><h2>選擇你的音樂大師</h2><p>從巴洛克到二十世紀，用作品、曲式、和聲與音樂史知識演奏勝利。</p></div><div id="setupOptions"></div></div><div class="artist-select-wrap"><div class="player-select"><div class="player-select-head"><label>P1 名稱<input id="p1Name" maxlength="16"></label><div><span>PLAYER 1</span><h3>P1 音樂家</h3></div></div><div id="p1Artists" class="artist-grid"></div></div><div id="p2Setup" class="player-select"><div class="player-select-head"><label>P2 名稱<input id="p2Name" maxlength="16"></label><div><span>PLAYER 2</span><h3>P2 音樂家</h3></div></div><div id="p2Artists" class="artist-grid"></div></div></div><div class="setup-actions"><p id="setupError" class="error" role="alert"></p><button id="startBattle" class="primary">奏響對決</button></div></div></section>
<section id="battle" class="screen battle-screen"><div class="battle-top"><div id="hudA" class="hud"></div><div class="round-center"><b id="modeLabel"></b><span id="roundLabel">MOVEMENT 1</span><strong id="battleTimer">00</strong><span id="cpuState"></span></div><div id="hudB" class="hud right"></div></div><div id="arena"><canvas id="battleCanvas" aria-label="音樂家知識格鬥舞台"></canvas><div id="arenaAlert" aria-live="assertive"></div><div id="turnBanner"></div></div><div id="battleControls"><div id="skillButtons" class="skills"></div><div id="quizPanel" class="quiz" hidden><div class="quiz-meta"><span id="difficultyBadge"></span><span id="questionTimer"></span></div><h2 id="questionText"></h2><div id="answers" class="answers"></div><div id="feedback" aria-live="polite"></div></div></div></section>
<section id="content" class="screen submenu-screen"><div class="panel wide content-panel"><button class="back" data-home>← 主選單</button><div id="contentBody"></div></div></section></main><div id="modal" class="modal" hidden><div class="modal-card" role="dialog" aria-modal="true"><div id="modalBody"></div><button id="modalClose" class="primary">繼續</button></div></div><div id="toast" role="status"></div></div><script type="module" src="js/main.js"></script></body></html>
